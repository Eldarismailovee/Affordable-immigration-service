services:
  postgres:
    image: postgres:16-alpine
    container_name: immigration-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    networks:
      - appnet

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: immigration-backend
    restart: unless-stopped
    environment:
      PORT: ${PORT}
      CLIENT_URL: ${CLIENT_URL}
      BASE_URL: ${BASE_URL}
      DATABASE_URL: ${DATABASE_URL}
      CHROMIUM_PATH: ${CHROMIUM_PATH}
    depends_on:
      - postgres
    volumes:
      - uploads_data:/app/uploads
    networks:
      - appnet

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: immigration-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - appnet

  nginx:
    image: nginx:stable-alpine
    container_name: immigration-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - appnet

volumes:
  pgdata:
  uploads_data:

networks:
  appnet:
    driver: bridge
